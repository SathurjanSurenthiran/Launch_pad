version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: student_showcase_backend
    ports:
      - "${PORT:-5000}:${PORT:-5000}"
    env_file:
      - .env
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/student_showcase
    depends_on:
      - mongodb
    networks:
      - showcase-net

  mongodb:
    image: mongo:7
    container_name: student_showcase_db
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - showcase-net

volumes:
  mongo-data:

networks:
  showcase-net:
    driver: bridge
